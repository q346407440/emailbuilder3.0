schemaVersion: "1.0.0"
meta:
  emailId: yaml_invalid_unknown
  templateId: yaml_invalid_unknown
  templateVersion: 1
  locale: zh-CN
root:
  kind: emailRoot
  id: invalid-root
  props:
    backgroundColor: "#ffffff"
    width: "600px"
    padding:
      top: "0"
      right: "0"
      bottom: "0"
      left: "0"
    border:
      style: solid
      color: "rgba(0,0,0,0)"
      top: "0"
      right: "0"
      bottom: "0"
      left: "0"
    gapMode: fixed
    gap: "0"
  children:
    - kind: text
      id: invalid-text
      props:
        textBody:
          version: 1
          paragraphs:
            - runs:
                - text: "非法字段示例"
        fontMode: inherit
        fontSize: "14px"
        color: "#222222"
        bold: false
        italic: false
        decoration: none
        unknownTextProp: "this-should-fail"
